<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos - Mazamorra La Original</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 400px; margin: auto; background-color: #f9f9f9; }
        .contenedor { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        label { font-weight: bold; color: #555; }
        input, button { width: 100%; padding: 12px; margin-top: 5px; margin-bottom: 20px; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #25D366; color: white; border: none; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #128C7E; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h2>Pedir Mazamorra 🌽</h2>
        <form id="formularioPedido">
            <label>ID de tu Negocio:</label><br>
            <input type="text" id="clienteId" placeholder="Ej: TIENDA-01" required><br>

            <label>Cantidad de Bolsas (1kg):</label><br>
            <input type="number" id="cantidadBolsas" min="1" placeholder="¿Cuántas necesitas?" required><br>

            <button type="submit" id="btnEnviar">Enviar Pedido y Notificar</button>
        </form>
    </div>

    <script>
        // ⚠️ REEMPLAZA ESTO: Tus datos de Supabase (Settings > API)
        const supabaseUrl = 'TU_URL_DE_SUPABASE';
        const supabaseKey = 'TU_CLAVE_ANONIMA_DE_SUPABASE';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('formularioPedido').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            
            const idCliente = document.getElementById('clienteId').value;
            const cantidad = document.getElementById('cantidadBolsas').value;
            const boton = document.getElementById('btnEnviar');
            
            boton.innerText = "Guardando pedido...";
            boton.style.backgroundColor = "#ccc";

            // Guardar en Supabase
            const { data, error } = await supabase
                .from('pedidos')
                .insert([{ cliente_id: idCliente, cantidad_bolsas: cantidad }]);

            if (error) {
                alert("Hubo un error: " + error.message);
                boton.innerText = "Enviar Pedido y Notificar";
                boton.style.backgroundColor = "#25D366";
            } else {
                // ⚠️ REEMPLAZA ESTO: El número de WhatsApp del despachador
                const numeroEmpresa = "573000000000"; 
                const mensaje = `Hola, acabo de registrar un pedido en el sistema por ${cantidad} bolsas de mazamorra. Mi ID de negocio es: ${idCliente}.`;
                const urlWhatsapp = `https://wa.me/${numeroEmpresa}?text=${encodeURIComponent(mensaje)}`;
                
                window.location.href = urlWhatsapp; 
            }
        });
    </script>
</body>
</html>
