<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos - Mazamorra La Original</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f0f2f5; margin: 0; }
        .contenedor { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); max-width: 450px; margin: 20px auto; }
        h2 { color: #1a1a1a; text-align: center; margin-bottom: 5px; }
        p.subtitulo { text-align: center; color: #666; margin-bottom: 25px; font-size: 14px; }
        .grupo-form { margin-bottom: 15px; }
        label { font-weight: 600; color: #444; font-size: 14px; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; transition: border-color 0.3s; }
        input:focus { border-color: #f5b041; outline: none; }
        button { width: 100%; padding: 14px; margin-top: 10px; background-color: #f5b041; color: #333; border: none; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #e6a13c; }
        .separador { border-bottom: 2px dashed #eee; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h2>Mazamorra La Original 🌽</h2>
        <p class="subtitulo">Portal B2B de Pedidos Mayoristas</p>
        
        <form id="formularioPedido">
            <div class="grupo-form">
                <label>Nombre del Negocio (Tienda/Supermercado):</label>
                <input type="text" id="nombreNegocio" placeholder="Ej: Supermercado El Ahorro" required>
            </div>

            <div class="grupo-form">
                <label>Nombre del Contacto:</label>
                <input type="text" id="nombreContacto" placeholder="Tu nombre completo" required>
            </div>

            <div class="grupo-form">
                <label>Correo Electrónico:</label>
                <input type="email" id="correo" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="grupo-form">
                <label>Teléfono / WhatsApp:</label>
                <input type="tel" id="telefono" placeholder="Ej: 310..." required>
            </div>

            <div class="grupo-form">
                <label>Dirección de Entrega y Ciudad:</label>
                <input type="text" id="direccion" placeholder="Ej: Calle 12 #34-56, Pereira" required>
            </div>

            <div class="separador"></div>

            <div class="grupo-form">
                <label>Cantidad de Bolsas (1kg):</label>
                <input type="number" id="cantidadBolsas" min="1" placeholder="¿Cuántas necesitas hoy?" required>
            </div>

            <button type="submit" id="btnEnviar">Confirmar Pedido</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ⚠️ REEMPLAZA ESTO CON TUS LLAVES DE FIREBASE (Las de apiKey, authDomain, etc.)
        const firebaseConfig = {
            apiKey: "AIzaSyAsUyKFTIE8BO6cC1HNJNx7ySfDOVCLOH8",
            authDomain: "pedidos-mazamorra.firebaseapp.com",
            projectId: "pedidos-mazamorra",
            storageBucket: "pedidos-mazamorra.firebasestorage.app",
            messagingSenderId: "845900639474",
            appId: "1:845900639474:web:f2dc79841165e7f991b46b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('formularioPedido').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            
            // Capturamos TODOS los datos nuevos
            const negocio = document.getElementById('nombreNegocio').value;
            const contacto = document.getElementById('nombreContacto').value;
            const correo = document.getElementById('correo').value;
            const telefono = document.getElementById('telefono').value;
            const direccion = document.getElementById('direccion').value;
            const cantidad = parseInt(document.getElementById('cantidadBolsas').value);
            
            const boton = document.getElementById('btnEnviar');
            boton.innerText = "Procesando...";
            boton.style.backgroundColor = "#ccc";

            try {
                // Guardamos un perfil de datos mucho más completo en la base de datos
                await addDoc(collection(db, "pedidos"), {
                    negocio: negocio,
                    contacto: contacto,
                    correo: correo,
                    telefono: telefono,
                    direccion: direccion,
                    cantidad_bolsas: cantidad,
                    fecha: new Date().toISOString(),
                    estado: "Pendiente"
                });

                // El mensaje de WhatsApp ahora es un resumen profesional
                const numeroEmpresa = "573108420470"; 
                const mensaje = `🌽 *NUEVO PEDIDO - MAZAMORRA LA ORIGINAL* 🌽\n\n*Negocio:* ${negocio}\n*Contacto:* ${contacto}\n*Dirección:* ${direccion}\n*Teléfono:* ${telefono}\n\n*Pedido:* ${cantidad} Bolsas (1kg)`;
                const urlWhatsapp = `https://wa.me/${numeroEmpresa}?text=${encodeURIComponent(mensaje)}`;
                
                window.location.href = urlWhatsapp; 

            } catch (error) {
                console.error("Error al guardar en Firebase:", error);
                alert("Hubo un error al guardar el pedido. Intenta de nuevo.");
                boton.innerText = "Confirmar Pedido";
                boton.style.backgroundColor = "#f5b041";
            }
        });
    </script>
</body>
</html>
